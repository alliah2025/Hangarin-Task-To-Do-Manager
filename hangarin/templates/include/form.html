{% load widget_tweaks %}
{% if form.non_field_errors %}
  <div class="alert alert-danger" role="alert">
    {% for error in form.non_field_errors %}
      <p{% if forloop.last %} class="mb-0"{% endif %}>{{ error }}</p>
    {% endfor %}
  </div>
{% endif %}
{% for field in form %}
<div class="h-form-group">
  <label class="h-form-label">{{ field.label }}</label>
  <div>
    {% render_field field class="h-form-control" %}
  </div>
  {% for error in field.errors %}
    <div style="color:var(--critical);font-size:12px;margin-top:4px">{{ error }}</div>
  {% endfor %}
</div>
{% endfor %}
