{% extends 'tasks/base.html' %}
{% load static %}

{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center fade-up">
  <div class="col-lg-8">
    <div class="h-card">
      <div class="h-card-header">
        <div class="h-card-title">{{ title }}</div>
        <a href="#" onclick="history.back(); return false;" class="btn-outline-hangarin" style="font-size:12px;padding:6px 12px;">Cancel</a>
      </div>
      <div class="p-4">
        <form method="POST">
          {% csrf_token %}
          {% include 'include/form.html' %}
          <div class="d-flex gap-2 mt-2">
            <button type="submit" class="btn-hangarin">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
              Save Task
            </button>
            <a href="#" onclick="history.back(); return false;" class="btn-outline-hangarin">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
