{% extends 'tasks/base.html' %}
{% load static %}

{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center fade-up">
  <div class="col-lg-6">
    <div class="h-card">
      <div class="h-card-header">
        <div class="h-card-title">{{ title }}</div>
        <a href="{% url 'subtask_list' %}" class="btn-outline-hangarin" style="font-size:12px;padding:6px 12px">Back</a>
      </div>
      <div class="p-4">
        <form method="POST">
          {% csrf_token %}
          {% include 'include/form.html' %}
          <div class="d-flex gap-2 mt-2">
            <button type="submit" class="btn-hangarin">Save Subtask</button>
            <a href="{% url 'subtask_list' %}" class="btn-outline-hangarin">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
