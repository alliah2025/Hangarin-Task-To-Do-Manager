{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Confirm Login - Hangarin</title>
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/hangarin.css' %}">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
    }
    .auth-card {
      max-width: 420px;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <img src="{% static 'img/logo.png' %}" alt="Hangarin" style="width:48px;margin-bottom:16px">
    <h4 style="font-weight:800;color:var(--text);margin-bottom:8px">Confirm Sign In</h4>
    <p style="font-size:13px;color:var(--muted);margin-bottom:24px">
      You are about to sign in using your <strong style="color:var(--text)">{{ provider.name }}</strong> account.
    </p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn-hangarin w-100 mb-3" style="justify-content:center">
        Continue with {{ provider.name }}
      </button>
    </form>
    <a href="{% url 'account_login' %}" class="btn-outline-hangarin w-100" style="justify-content:center">Cancel</a>
  </div>
  <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
